<!DOCTYPE html>
<html>
<head>
    <title>Predict Vehicle Price</title>
</head>
<body>

<h1>Vehicle Price Prediction</h1>

<form id="predictionForm">

    <label>Brand:</label><br>
    <select name="marke" required>
        <option value="Bmw">BMW</option>
        <option value="Mercedes-Benz">Mercedes-Benz</option>
        <option value="Opel">Opel</option>
        <option value="Volkswagen">Volkswagen</option>
    </select><br><br>

    <label>Model:</label><br>
    <select name="modell" required>
        <option value="A4">A4</option>
        <option value="A6">A6</option>
        <option value="Astra">Astra</option>
        <option value="C-Klasse">C-Klasse</option>
        <option value="Corsa">Corsa</option>
        <option value="E-Klasse">E-Klasse</option>
        <option value="Golf">Golf</option>
        <option value="Passat">Passat</option>
        <option value="Q5">Q5</option>
        <option value="Tiguan">Tiguan</option>
        <option value="X5">X5</option>
    </select><br><br>

    <label>Fuel Type:</label><br>
    <select name="kraftstoff" required>
        <option value="Benzin">Benzin</option>
        <option value="Diesel">Diesel</option>
        <option value="Elektro">Elektro</option>
        <option value="Hybrid">Hybrid</option>
    </select><br><br>

    <label>Transmission:</label><br>
    <select name="getriebe" required>
        <option value="Automatik">Automatik</option>
        <option value="Manuell">Manuell</option>
    </select><br><br>

    <label>Federal State:</label><br>
    <select name="bundesland" required>
        <option value="Bayern">Bayern</option>
        <option value="Berlin">Berlin</option>
        <option value="Hamburg">Hamburg</option>
        <option value="Hessen">Hessen</option>
        <option value="Nrw">NRW</option>
        <option value="Niedersachsen">Niedersachsen</option>
    </select><br><br>

    <label>Weekday:</label><br>
    <select name="wochentag" required>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
        <option value="Sunday">Sunday</option>
    </select><br><br>

    <label>Sales Number:</label><br>
    <input type="number" name="verkaufszahl" value="2" required><br><br>

    <label>Engine Size (L):</label><br>
    <input type="number" step="0.1" name="hubraum_l" value="2.0" required><br><br>

    <label>Customer Satisfaction:</label><br>
    <input type="number" step="0.1" min="1" max="5" name="kundenzufriedenheit" value="4.0" required><br><br>

    <label>Year:</label><br>
    <input type="number" name="jahr" value="2024" required><br><br>

    <label>Month:</label><br>
    <input type="number" min="1" max="12" name="monat" value="1" required><br><br>

    <button type="submit">Predict Price</button>

</form>

<h2>Result</h2>
<pre id="result"></pre>

<script>
document.getElementById("predictionForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const data = {
        marke: document.querySelector('[name="marke"]').value,
        modell: document.querySelector('[name="modell"]').value,
        kraftstoff: document.querySelector('[name="kraftstoff"]').value,
        getriebe: document.querySelector('[name="getriebe"]').value,
        bundesland: document.querySelector('[name="bundesland"]').value,
        wochentag: document.querySelector('[name="wochentag"]').value,
        verkaufszahl: parseFloat(document.querySelector('[name="verkaufszahl"]').value),
        hubraum_l: parseFloat(document.querySelector('[name="hubraum_l"]').value),
        kundenzufriedenheit: parseFloat(document.querySelector('[name="kundenzufriedenheit"]').value),
        jahr: parseInt(document.querySelector('[name="jahr"]').value),
        monat: parseInt(document.querySelector('[name="monat"]').value)
    };

    const response = await fetch("/api/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").textContent = JSON.stringify(result, null, 2);
});
</script>

</body>
</html>
