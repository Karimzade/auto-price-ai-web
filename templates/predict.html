<!DOCTYPE html>
<html>
<head>
    <title>Auto Price AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container py-5">

   <header class="site-header mb-5">
    <div class="logo">
        <span class="gold">Auto</span>Price AI
    </div>

    <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/predict">Predict Price</a>
        <a href="/contact">Contact</a>
    </nav>
</header>

    <div class="row align-items-center mb-5">
        <div class="col-lg-6">
            <h1 class="display-2 fw-bold">
                Vehicle Price <span class="gold">Prediction</span>
            </h1>
            <p class="lead">AI-powered vehicle valuation system</p>
        </div>

        <div class="col-lg-6 text-center">
            <img src="{{ url_for('static', filename='images/bmw.png') }}" class="img-fluid">
        </div>
    </div>

    <div class="predict-card">
        <h3 class="gold mb-4">Vehicle Details</h3>

        <form id="predictionForm" class="row g-4">

            <div class="col-md-3">
                <label>Brand</label>
                <select class="form-select" name="marke" required>
                    <option value="Bmw">BMW</option>
                    <option value="Mercedes-Benz">Mercedes-Benz</option>
                    <option value="Opel">Opel</option>
                    <option value="Volkswagen">Volkswagen</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Model</label>
                <select class="form-select" name="modell" required>
                    <option value="A4">A4</option>
                    <option value="A6">A6</option>
                    <option value="Astra">Astra</option>
                    <option value="C-Klasse">C-Klasse</option>
                    <option value="Corsa">Corsa</option>
                    <option value="E-Klasse">E-Klasse</option>
                    <option value="Golf">Golf</option>
                    <option value="Passat">Passat</option>
                    <option value="Q5">Q5</option>
                    <option value="Tiguan">Tiguan</option>
                    <option value="X5">X5</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Fuel Type</label>
                <select class="form-select" name="kraftstoff" required>
                    <option value="Benzin">Benzin</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Elektro">Elektro</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Transmission</label>
                <select class="form-select" name="getriebe" required>
                    <option value="Automatik">Automatik</option>
                    <option value="Manuell">Manuell</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Federal State</label>
                <select class="form-select" name="bundesland" required>
                    <option value="Bayern">Bayern</option>
                    <option value="Berlin">Berlin</option>
                    <option value="Hamburg">Hamburg</option>
                    <option value="Hessen">Hessen</option>
                    <option value="Nrw">NRW</option>
                    <option value="Niedersachsen">Niedersachsen</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Weekday</label>
                <select class="form-select" name="wochentag" required>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Sales Number</label>
                <input class="form-control" type="number" name="verkaufszahl" value="2" required>
            </div>

            <div class="col-md-3">
                <label>Engine Size (L)</label>
                <input class="form-control" type="number" step="0.1" name="hubraum_l" value="2.0" required>
            </div>

            <div class="col-md-4">
                <label>Customer Satisfaction</label>
                <input class="form-control" type="number" step="0.1" min="1" max="5" name="kundenzufriedenheit" value="4.0" required>
            </div>

            <div class="col-md-4">
                <label>Year</label>
                <input class="form-control" type="number" name="jahr" value="2024" required>
            </div>

            <div class="col-md-4">
                <label>Month</label>
                <input class="form-control" type="number" min="1" max="12" name="monat" value="1" required>
            </div>

            <div class="col-12">
                <button class="btn btn-gold btn-lg w-100" type="submit">
                    Predict Price
                </button>
            </div>

        </form>
    </div>

    <div class="result-box">
        <h3>Estimated Vehicle Price</h3>
        <div id="priceResult" class="price">€0</div>
    </div>

</div>

<script>
document.getElementById("predictionForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const data = {
        marke: document.querySelector('[name="marke"]').value,
        modell: document.querySelector('[name="modell"]').value,
        kraftstoff: document.querySelector('[name="kraftstoff"]').value,
        getriebe: document.querySelector('[name="getriebe"]').value,
        bundesland: document.querySelector('[name="bundesland"]').value,
        wochentag: document.querySelector('[name="wochentag"]').value,
        verkaufszahl: parseFloat(document.querySelector('[name="verkaufszahl"]').value),
        hubraum_l: parseFloat(document.querySelector('[name="hubraum_l"]').value),
        kundenzufriedenheit: parseFloat(document.querySelector('[name="kundenzufriedenheit"]').value),
        jahr: parseInt(document.querySelector('[name="jahr"]').value),
        monat: parseInt(document.querySelector('[name="monat"]').value)
    };

    const response = await fetch("/api/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.status === "success") {
        document.getElementById("priceResult").innerHTML =
            "€ " + Number(result.predicted_price_euro).toLocaleString();
    } else {
        document.getElementById("priceResult").innerHTML = "Error";
    }
});
</script>

</body>
</html>
